name: Rust CI/CD

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Format, lint, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Use stable Rust
        run: rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features --locked

      - name: Build release
        run: cargo build --workspace --all-targets --release --locked

  opening-book-consistency:
    name: Opening book contract consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Rust stack
        uses: actions/checkout@v6
        with:
          path: quantik-core-rust

      - name: Checkout Python stack
        uses: actions/checkout@v6
        with:
          repository: mberlanda/quantik-core-py
          ref: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'main' }}
          path: quantik-core-py

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Use stable Rust
        run: rustup default stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python package
        working-directory: quantik-core-py
        run: python -m pip install -e .

      - name: Run opening-book consistency action
        uses: mberlanda/quantik-core-contracts/actions/opening-book-consistency@v1.2.0
        with:
          rust-command: |
            mkdir -p quantik-core-rust/target/opening-book-consistency
            cd quantik-core-rust
            scripts/generate_opening_book.sh search \
              --depth 4 \
              --db target/opening-book-consistency/depth4.sqlite \
              --profile debug \
              --quiet
            scripts/inspect_opening_book.sh summary-json \
              --db target/opening-book-consistency/depth4.sqlite \
              --depth 4 \
              --output target/opening-book-consistency/rust-summary.json \
              --profile debug
          python-command: |
            cd quantik-core-py
            python -m quantik_core.opening_book_summary \
              --db ../quantik-core-rust/target/opening-book-consistency/depth4.sqlite \
              --depth 4 \
              --output ../quantik-core-rust/target/opening-book-consistency/python-summary.json
          rust-summary: quantik-core-rust/target/opening-book-consistency/rust-summary.json
          python-summary: quantik-core-rust/target/opening-book-consistency/python-summary.json
          expected-depth: "4"
          expected-release: "1.2.0"

  release-artifacts:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    needs: ci
    # Release binaries are published manually for now; keep this job disabled until
    # the repository needs GitHub-hosted binary artifacts again.
    if: ${{ false }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Use stable Rust
        run: rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Package binaries
        run: |
          mkdir -p dist
          install -m 755 target/release/bench_bfs dist/bench_bfs-linux-x86_64
          install -m 755 target/release/book_builder dist/book_builder-linux-x86_64
          install -m 755 target/release/validate dist/validate-linux-x86_64

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: quantik-core-rust-${{ github.ref_name }}-linux-x86_64
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --generate-notes
          fi

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: ci
    # Crate publishing is manual for now, matching the release process used for
    # v1.2.0.
    if: ${{ false }}
    environment: release
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Use stable Rust
        run: rustup default stable

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish -p quantik-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
